<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Search | IT 4403</title>
  <link rel="stylesheet" href="../../css/style.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/search.js"></script>

  <style>
    #searchArea {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #searchInput {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #f5f5f5;
      font-size: 1rem;
    }

    #searchBtn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #d4af37;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    #searchBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #paginationControls {
      margin: 16px 0;
    }

    #pageSelect {
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #f5f5f5;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .book-card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px;
    }

    .book-card img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 10px;
      background: #111;
      border: 1px solid #2a2a2a;
    }

    .book-card h3 {
      margin-top: 12px;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .book-card a {
      color: #d4af37;
      text-decoration: none;
    }

    .book-card a:hover {
      text-decoration: underline;
    }

    .no-image {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      background: #111;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
    }

    .meta-text {
      color: #cfcfcf;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-btn active" href="milestone2-booksearch.html">Book Search</a>
    <a class="nav-btn" href="../index.html">Home</a>
    <a class="nav-btn" href="bookshelf.html">My Bookshelf</a>
  </nav>

  <main>

    <div class="card">
      <h1>Book Search</h1>
      <p>Search for books using the Google Books API.</p>

      <div id="searchArea">
        <input type="text" id="searchInput" placeholder="Enter a book title or keyword...">
        <button id="searchBtn">Search</button>
      </div>

      <div id="paginationControls">
        <label for="pageSelect">Page:</label>
        <select id="pageSelect"></select>
      </div>

      <div id="results">
        <p class="meta-text">Results will appear here.</p>
      </div>
    </div>
  </main>
</body>
</html>
