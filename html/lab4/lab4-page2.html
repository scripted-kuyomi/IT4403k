<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab 4 - Page 2 | Album and Photos</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    :root {
      --bg: #111111;
      --surface: #1b1b1b;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --accent: gold;
      --border: #333333;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    h1,
    h2 {
      color: var(--accent);
      margin-top: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .photo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .photo-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      background: #0f0f0f;
    }

    .photo-card p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .meta {
      color: var(--muted);
    }

    @media (max-width: 600px) {
      body {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <h1>Lab 4 - Page 2</h1>
  <p><a href="lab4-page1.html">← Back to Page 1</a></p>

  <div class="card">
    <h2>Album Information</h2>
    <div id="albumOutput">Loading album...</div>
  </div>

  <div class="card">
    <h2>Album Photos</h2>
    <div id="photosOutput" class="photos-grid">Loading photos...</div>
  </div>

  <script>
    $(function () {
      const params = new URLSearchParams(window.location.search);
      const albumId = params.get("albumId");

      if (!albumId) {
        $("#albumOutput").html("<p>No album ID provided in the URL.</p>");
        $("#photosOutput").html("<p>No photos to display.</p>");
        return;
      }

      $.getJSON(`https://jsonplaceholder.typicode.com/albums/${albumId}`, function (album) {
        $("#albumOutput").html(`
          <p><strong>Album Title:</strong> ${album.title}</p>
          <p><strong>Album ID:</strong> ${album.id}</p>
          <p><strong>User ID:</strong> ${album.userId}</p>
        `);
      }).fail(function () {
        $("#albumOutput").html("<p>Could not load album information.</p>");
      });

      $.getJSON(`https://jsonplaceholder.typicode.com/photos?albumId=${albumId}`, function (photos) {
        if (!photos.length) {
          $("#photosOutput").html("<p>No photos found for this album.</p>");
          return;
        }

        let html = "";

        photos.forEach(function (photo) {
          html += `
            <div class="photo-card">
              <img src="${photo.thumbnailUrl}" alt="${photo.title}">
              <p>${photo.title}</p>
            </div>
          `;
        });

        $("#photosOutput").html(html);
      }).fail(function () {
        $("#photosOutput").html("<p>Could not load photos.</p>");
      });
    });
  </script>
</body>
</html>
