<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Bookshelf | IT 4403</title>

    <link rel="stylesheet" href="css/style.css"/>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/bookshelf.js"></script>

    <style>
        .books-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top:18px;
        }

        .book-card{
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius:14px;
            padding: 14px;
        }

        .book-card img{
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
        }

        .book-card h3{
            margin-top: 12px;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .book-card a {
            color: #d4af37;
            text-decoration: none;
        }

        .book-card a:hover {
            text-decoration: underline;
        }

        .meta-text{
            color: #cfcfcf;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <nav aria-label="Primary navigation">
        <a class="nav-btn" href="index.html">Home</a>
        <a class="nav-btn" href="project.html">Projet Homepage</a>
        <a class="nav-btn" href="milestone2-booksearch.html">Book Search</a>
        <a class="nav-btn" href="bookshelf.html">Bookshelf</a>
    </nav>

    <main>
        <div class="card">
            <h1>My Bookshelf</h1>
            <p class="meta-text">Books loaded from selected Google Books volume IDs.</p>
            <div id="bookshelfOutput" class="books-grid">Loading bookshelf...</div>
        </div>
    </main>
</body>
</html>
